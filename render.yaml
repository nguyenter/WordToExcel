services:
  - type: web
    name: wordtoexcel-flask
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn index:app --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: DATABASE_URI
        value: sqlite:///render.db
      - key: SECRET_KEY
        generateValue: true
